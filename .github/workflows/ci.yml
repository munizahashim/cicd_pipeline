# ─────────────────────────────────────────────────────────────
#  CI/CD Pipeline — GitHub Actions
#
#  STAGES:
#   1. lint   – check code style with ESLint
#   2. test   – run Jest unit tests
#   3. build  – simulate a production build
#   4. deploy – simulate deployment (only on pushes to main)
# ─────────────────────────────────────────────────────────────

name: CI/CD Pipeline

# TRIGGER: when does this pipeline run?
on:
  push:
    branches:
      - main        # every push to main
      - "feature/*" # every push to any feature branch
  pull_request:
    branches:
      - main        # every PR that targets main

jobs:
  # ── JOB 1: Lint ───────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest   # the virtual machine GitHub provides

    steps:
      # Step 1 — check out your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — set up the Node.js version we want
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"       # cache node_modules between runs for speed

      # Step 3 — install dependencies
      - name: Install dependencies
        run: npm ci            # 'ci' is stricter than 'install' (uses package-lock.json)

      # Step 4 — run the linter
      - name: Run ESLint
        run: npm run lint

  # ── JOB 2: Test ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint               # only run if lint passed

    strategy:
      matrix:
        node-version: ["18", "20"]   # run tests on two Node versions in parallel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Optional: upload coverage report as a build artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore   # don't fail if coverage wasn't generated

  # ── JOB 3: Build ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test               # only run if tests passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (simulate)
        run: |
          echo "Building the application..."
          mkdir -p dist
          cp -r src/* dist/
          echo "Build complete. Files in dist/:"
          ls dist/

      # Save the build output so the deploy job can use it
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  # ── JOB 4: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build              # only run if build passed

    # IMPORTANT: only deploy when code lands on main (not on PRs or feature branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production        # links to GitHub Environments for approval gates & secrets

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Deploy to production (simulated)
        run: |
          echo "Deploying to production..."
          echo "Files being deployed:"
          ls dist/
          echo ""
          echo "Deployment successful! (simulated)"
          echo "In a real pipeline you would run e.g.:"
          echo "  - aws s3 sync dist/ s3://my-bucket"
          echo "  - heroku container:push web"
          echo "  - kubectl apply -f k8s/"
